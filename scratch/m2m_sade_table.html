<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sade M2M Tablo Tasarımı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            color: #1f2328;
            padding: 2rem;
        }
        .tick { font-variant-numeric: tabular-nums; }
        .usage-bar-bg { background-color: #e5e7eb; border-radius: 9999px; height: 6px; }
        .usage-bar-fill { height: 100%; border-radius: 9999px; transition: width .5s ease; }
    </style>
</head>
<body>
    <div class="max-w-[1600px] mx-auto bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full text-left" style="min-width: 1500px">
                <thead>
                    <tr class="text-[11px] text-gray-500 uppercase tracking-wider border-b border-gray-100 bg-gray-50/60 font-semibold">
                        <th class="px-3 py-2.5 w-10 text-center"><input type="checkbox" class="accent-blue-600"></th>
                        <th class="px-3 py-2.5" style="width:150px">Telefon</th>
                        <th class="px-3 py-2.5" style="width:190px">ICCID</th>
                        <th class="px-3 py-2.5" style="width:120px">Operatör</th>
                        <th class="px-3 py-2.5" style="width:80px">Tip</th>
                        <th class="px-3 py-2.5" style="width:140px">Paket</th>
                        <th class="px-3 py-2.5" style="width:110px">Plaka</th>
                        <th class="px-3 py-2.5" style="width:140px">Personel</th>
                        <th class="px-3 py-2.5" style="width:120px">Departman</th>
                        <th class="px-3 py-2.5" style="width:140px">Şirket</th>
                        <th class="px-3 py-2.5" style="width:180px">Kullanım</th>
                        <th class="px-3 py-2.5 text-right" style="width:100px">Maliyet</th>
                        <th class="px-3 py-2.5" style="width:120px">Son Kullanım</th>
                        <th class="px-3 py-2.5" style="width:100px">Durum</th>
                        <th class="px-3 py-2.5 w-10"></th>
                    </tr>
                </thead>
                <tbody class="text-[12.5px] divide-y divide-gray-100">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-3 py-2 text-center"><input type="checkbox" class="accent-blue-600"></td>
                        <td class="px-3 py-2 font-mono text-gray-800 font-semibold">+90 539 812 8628</td>
                        <td class="px-3 py-2 font-mono text-gray-500 text-[11px]">899010000000000123</td>
                        <td class="px-3 py-2 text-gray-700">Turkcell</td>
                        <td class="px-3 py-2">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-semibold bg-[#eef2ff] text-[#4338ca]">M2M</span>
                        </td>
                        <td class="px-3 py-2 text-gray-700">M2M 1GB</td>
                        <td class="px-3 py-2 font-semibold text-gray-900">34 ABC 123</td>
                        <td class="px-3 py-2 text-gray-700">—</td>
                        <td class="px-3 py-2 text-gray-600">Operasyon</td>
                        <td class="px-3 py-2 text-gray-600">Talay Logistics</td>
                        <td class="px-3 py-2">
                            <div class="flex flex-col gap-1">
                                <div class="flex justify-between text-[10px] font-semibold text-gray-400">
                                    <span>124.0 / 180 GB</span>
                                    <span class="text-amber-600">68%</span>
                                </div>
                                <div class="usage-bar-bg">
                                    <div class="usage-bar-fill bg-amber-500" style="width: 68%"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-3 py-2 text-right font-semibold tick text-gray-900 whitespace-nowrap">245,50 ₺</td>
                        <td class="px-3 py-2 text-gray-500 whitespace-nowrap">18.04.2024</td>
                        <td class="px-3 py-2">
                            <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-semibold bg-[#ecfdf5] text-[#059669]">
                                <span class="w-1.5 h-1.5 rounded-full bg-[#10b981]"></span>
                                Aktif
                            </span>
                        </td>
                        <td class="px-3 py-2 text-right">
                            <button class="text-gray-400 hover:text-gray-900 w-7 h-7 rounded-md hover:bg-gray-100 flex items-center justify-center">
                                <i class="fas fa-ellipsis-h text-[12px]"></i>
                            </button>
                        </td>
                    </tr>
                    <!-- More rows can be added here -->
                </tbody>
            </table>
        </div>
        <!-- Pagination Placeholder -->
        <div class="flex items-center justify-between px-4 py-2.5 border-t border-gray-100 bg-gray-50/40">
            <div class="text-[12px] text-gray-500 font-medium">Sayfa başına 50 · 1–50 / 482 sonuç</div>
            <div class="flex items-center gap-2">
                <button class="w-8 h-8 rounded border border-gray-200 bg-white text-gray-400 disabled:opacity-30"><i class="fas fa-angle-left"></i></button>
                <span class="px-3 text-[12px] font-bold text-gray-900">1 / 10</span>
                <button class="w-8 h-8 rounded border border-gray-200 bg-white text-gray-500 hover:bg-gray-50 shadow-sm"><i class="fas fa-angle-right"></i></button>
            </div>
        </div>
    </div>
</body>
</html>
